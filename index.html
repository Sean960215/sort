<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>排序視覺化首頁</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 16px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		}

		.container {
			width: 100%;
			max-width: 760px;
			background: white;
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
			text-align: center;
		}

		h1 {
			color: #4c5fd7;
			margin-bottom: 8px;
			font-size: 2rem;
		}

		p {
			color: #555;
			margin-bottom: 24px;
		}

		.algorithm-grid {
			display: grid;
			grid-template-columns: repeat(6, minmax(0, 1fr));
			gap: 14px;
		}

		.algorithm-card {
			border: 2px solid #e8ecff;
			border-radius: 12px;
			padding: 20px;
			background: #f8faff;
			grid-column: span 2;
		}

		.algorithm-card h2 {
			color: #333;
			margin-bottom: 10px;
		}

		.algorithm-card p {
			margin-bottom: 16px;
			color: #666;
		}

		.enter-btn {
			display: inline-block;
			text-decoration: none;
			color: white;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			padding: 12px 24px;
			border-radius: 10px;
			font-weight: bold;
			transition: transform 0.25s ease, box-shadow 0.25s ease;
		}

		.enter-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 18px rgba(102, 126, 234, 0.35);
		}

		.locked-card {
			border-color: #e2e2e2;
			background: #f5f5f5;
			opacity: 0.8;
		}

		.locked-card h2,
		.locked-card p {
			color: #8b8b8b;
		}

		.locked-btn {
			display: inline-block;
			color: #9a9a9a;
			background: #e4e4e4;
			padding: 12px 24px;
			border-radius: 10px;
			font-weight: bold;
			border: none;
			cursor: not-allowed;
		}

		.algorithm-grid .algorithm-card:nth-child(4) {
			grid-column: 2 / span 2;
		}

		.algorithm-grid .algorithm-card:nth-child(5) {
			grid-column: 4 / span 2;
		}

		@media (max-width: 900px) {
			.algorithm-grid {
				grid-template-columns: 1fr;
			}

			.algorithm-card,
			.algorithm-grid .algorithm-card:nth-child(4),
			.algorithm-grid .algorithm-card:nth-child(5) {
				grid-column: 1;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>📚 排序演算法互動教學</h1>
		<p>請選擇想學習的排序演算法</p>

		<div class="algorithm-grid">

		<div class="algorithm-card">
			<h2>🔄 Bubble Sort（冒泡排序）</h2>
			<p>透過動畫與逐步控制，觀察比較與交換的每個過程。</p>
			<a class="enter-btn" href="bubble_sort.html">進入 Bubble Sort 視覺化</a>
		</div>

		<div class="algorithm-card">
			<h2>🎯 Selection Sort（選擇排序）</h2>
			<p>逐輪找出最小值，放到正確位置，清楚掌握每次比較與交換。</p>
			<a class="enter-btn" href="selection_sort.html">進入 Selection Sort 視覺化</a>
		</div>

		<div class="algorithm-card locked-card">
			<h2>🧩 Insertion Sort（插入排序）</h2>
			<p>模擬撲克牌整理方式，將元素逐一插入已排序區間。</p>
			<a class="enter-btn" href="insertion_sort.html">進入 Insertion Sort 視覺化</a>
		</div>

		<div class="algorithm-card locked-card">
			<h2>🔒 敬請期待 03</h2>
			<p>新內容開發中，暫時無法進入。</p>
			<button class="locked-btn" disabled>尚未開放</button>
		</div>

		<div class="algorithm-card locked-card">
			<h2>🔒 敬請期待 04</h2>
			<p>新內容開發中，暫時無法進入。</p>
			<button class="locked-btn" disabled>尚未開放</button>
		</div>
		</div>
	</div>
</body>
</html>
